name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# ponytail: single deploy workflow doubles as project bootstrap + domain attach.
# Split out once real render CI (entry rendering, bot) lands in planning.
jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-pages
    steps:
      - uses: actions/checkout@v4

      # Idempotent: fails harmlessly if the project already exists.
      - name: Ensure Pages project
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ocx-index --production-branch=main

      - name: Deploy public/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=ocx-index --branch=main

      # Canonical index endpoint is index.ocx.rs (machine surface); the apex
      # ocx.rs belongs to the website (human surface) and is managed by the
      # ocx repo's website deploy. Check-then-act idempotent.
      # The bootstrap-era apex attachment on this project is evicted by the
      # website's first prod deploy — not managed here.
      - name: Ensure custom domain + DNS record (index.ocx.rs)
        env:
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: e7e05c1d7edc241e4a7fde08e423483f  # ocx.rs zone id (stable; update if zone recreated)
        run: |
          set -euo pipefail
          domains="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/ocx-index/domains"
          recs="https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records"
          auth="Authorization: Bearer $CF_TOKEN"
          json="Content-Type: application/json"
          # 1. Attach the Pages custom domain if not present.
          if ! curl -sS -H "$auth" "$domains" | jq -e 'any(.result[]?; .name=="index.ocx.rs")' >/dev/null; then
            curl -sS -X POST -H "$auth" -H "$json" "$domains" --data '{"name":"index.ocx.rs"}' | jq -e '.success'
          fi
          # 2. Ensure a proxied CNAME to the pages.dev target.
          if ! curl -sS -H "$auth" "$recs?type=CNAME&name=index.ocx.rs" | jq -e 'any(.result[]?; .name=="index.ocx.rs")' >/dev/null; then
            curl -sS -X POST -H "$auth" -H "$json" "$recs" \
              --data '{"type":"CNAME","name":"index","content":"ocx-index.pages.dev","proxied":true,"comment":"OCX index endpoint to Pages"}' \
              | jq -e '.success'
          fi
