name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# ponytail: single deploy workflow doubles as project bootstrap + domain attach.
# Split out once real render CI (entry rendering, bot) lands in planning.
jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-pages
    steps:
      - uses: actions/checkout@v4

      # Idempotent: fails harmlessly if the project already exists.
      - name: Ensure Pages project
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ocx-index --production-branch=main

      - name: Deploy public/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=ocx-index --branch=main

      # Attach the Pages custom domain AND ensure the apex DNS record. The domain
      # attach alone does not create the apex record (unlike subdomains), so the
      # site is unreachable at ocx.rs until a proxied CNAME → pages.dev exists
      # (Cloudflare flattens CNAME at apex). Both checks are check-then-act idempotent.
      - name: Ensure custom domain + apex DNS record
        env:
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE: e7e05c1d7edc241e4a7fde08e423483f  # ocx.rs zone id (stable; update if zone recreated)
        run: |
          set -euo pipefail
          domains="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/ocx-index/domains"
          recs="https://api.cloudflare.com/client/v4/zones/$CF_ZONE/dns_records"
          auth="Authorization: Bearer $CF_TOKEN"
          json="Content-Type: application/json"
          # 1. Attach the Pages custom domain if not present.
          if ! curl -sS -H "$auth" "$domains" | jq -e 'any(.result[]?; .name=="ocx.rs")' >/dev/null; then
            curl -sS -X POST -H "$auth" -H "$json" "$domains" --data '{"name":"ocx.rs"}' | jq -e '.success'
          fi
          # 2. Ensure a proxied apex CNAME to the pages.dev target.
          if ! curl -sS -H "$auth" "$recs?type=CNAME&name=ocx.rs" | jq -e 'any(.result[]?; .name=="ocx.rs")' >/dev/null; then
            curl -sS -X POST -H "$auth" -H "$json" "$recs" \
              --data '{"type":"CNAME","name":"ocx.rs","content":"ocx-index.pages.dev","proxied":true,"comment":"OCX index apex to Pages"}' \
              | jq -e '.success'
          fi
