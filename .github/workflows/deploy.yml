name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# ponytail: single deploy workflow doubles as project bootstrap + domain attach.
# Split out once real render CI (entry rendering, bot) lands in planning.
jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency: deploy-pages
    steps:
      - uses: actions/checkout@v4

      # Idempotent: fails harmlessly if the project already exists.
      - name: Ensure Pages project
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ocx-index --production-branch=main

      - name: Deploy public/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=ocx-index --branch=main

      # Same-account zone → attaching the apex auto-provisions the DNS record + cert.
      # Idempotent by check-then-act: skip if already attached (no reliance on error text).
      - name: Attach custom domain ocx.rs
        env:
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          api="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/ocx-index/domains"
          if curl -sS "$api" -H "Authorization: Bearer $CF_TOKEN" \
               | jq -e '.result[]?.name == "ocx.rs"' >/dev/null; then
            echo "ocx.rs already attached"; exit 0
          fi
          resp=$(curl -sS -X POST "$api" \
            -H "Authorization: Bearer $CF_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"name":"ocx.rs"}')
          echo "$resp"
          [ "$(echo "$resp" | jq -r '.success')" = "true" ]
