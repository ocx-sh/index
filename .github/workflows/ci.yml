name: ci

on:
  pull_request:
  push:
    branches: [main]
  # Nightly, independent of `bot/**` PR activity — pip-audit's vulnerability
  # database moves even when no code changes (ADR-4 BD-7: "pip-audit | Every
  # PR + nightly"). `bot-audit` has no `if:` guard so it runs on every
  # trigger; the other four jobs skip the schedule trigger to avoid a
  # pointless nightly re-run of unrelated gates.
  schedule:
    - cron: "0 4 * * *" # nightly, 04:00 UTC

permissions: {}

jobs:
  schema-validate:
    name: schema-validate
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-bot
      - name: task schema:validate
        run: task schema:validate

  bot-lint:
    name: bot-lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-bot
      - name: task bot:lint
        run: task bot:lint

  bot-test:
    name: bot-test
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-bot
      - name: task bot:test
        run: task bot:test

  bot-audit:
    name: bot-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-bot
      - name: task bot:audit
        run: task bot:audit

  workflows-lint:
    name: workflows-lint
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-bot
      # NOTE for the `workflows:lint` taskfile target (owned by WP1-C, not this
      # workflow): `uvx zizmor --min-severity medium .github/workflows/` flags
      # deploy.yml's unpinned actions (known legacy, replaced by WP3-A's
      # render-deploy.yml). Scope the task target's invocation to the files
      # that must stay clean today instead of silencing with inline zizmor
      # ignores; widen to the whole directory once WP3-A lands.
      - name: task workflows:lint
        run: task workflows:lint

  site-build:
    name: site-build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      # task-only — no uv/Python, so this skips setup-bot (scoped to the
      # indexbot toolchain) and installs just the Task binary directly.
      - uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52  # v3.0.0
        with:
          version: "3.x"
          repo-token: ${{ github.token }}
      # SHA verified 2026-07-17 against oven-sh/setup-bun's own release
      # tag+commit (`gh api repos/oven-sh/setup-bun/git/ref/tags/v2.2.0` and
      # `gh api repos/oven-sh/setup-bun/commits/<sha>` both resolve to this
      # SHA) and cross-checked against the SHA ocx-sh/ocx's
      # website deploy workflow (`.github/workflows/deploy-website.yml`)
      # already pins for the same tag.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
      - name: task site:build
        run: task site:build
