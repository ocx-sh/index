name: announce

# repository_dispatch doorbell (ADR-4 Technical Details, design_spec G-08): the
# publisher's payload is never trusted for content, only as a lookup key —
# every written field is re-derived from GHCR registry truth inside
# `indexbot announce` itself. This workflow only (a) validates the payload
# shape before anything privileged runs, and (b) hands off to the bot with a
# write-scoped credential.
#
# event_type "announce" per ADR-4's Technical Details section and
# design_spec_registry_indirection.md G-08 (both explicit, both currently
# authoritative) — see open_questions if this repo's plan meant a different
# literal string.
on:
  repository_dispatch:
    types: [announce]

permissions: {}

# One in-flight run per package: an older announce for the same package
# should never race a newer one to a PR (ADR-4 G-17/BD-4). Safe here because
# the untrusted payload is only used as a `concurrency:` group-key expression,
# never interpolated into a `run:` shell string.
concurrency:
  group: announce-${{ github.event.client_payload.package }}
  cancel-in-progress: true

jobs:
  # Unprivileged: zero secrets, zero write scope. Only checks the untrusted
  # payload's shape before job 2 ever runs with a write-scoped credential
  # (ADR-4 BD-4/BD-5 privileged-unprivileged split).
  validate-payload:
    name: validate-payload
    runs-on: ubuntu-latest
    permissions: {}
    env:
      # Env-var indirection (ADR-4 BD-4): this is the ONLY place in this job
      # the raw client_payload expression appears — every step below reads
      # $PACKAGE_ID from the process environment, never `${{ }}` in `run:`.
      PACKAGE_ID: ${{ github.event.client_payload.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-bot

      - name: Validate payload shape (no network, no write scope)
        working-directory: bot
        run: uv run indexbot announce --validate-only

  # Privileged: index-write Environment token, harden-runner egress audit.
  # This is the only job in this workflow that ever holds write scope.
  regen-and-pr:
    name: regen-and-pr
    needs: validate-payload
    runs-on: ubuntu-latest
    environment: index-write
    permissions:
      contents: write # commit_files (Git Data API) writes the regenerated p/<ns>/<pkg>.json + CAS objects
      pull-requests: write # open_or_update_pull_request / enable_auto_merge for the resulting PR
    env:
      # Same indirection discipline as job 1 — one mapping, all steps below
      # read $PACKAGE_ID, never the raw expression again.
      PACKAGE_ID: ${{ github.event.client_payload.package }}
    steps:
      # Must be the first step (ADR-4 BD-6): this job both fetches (GHCR
      # registry reads) and writes (commit + PR) — audit mode only for now,
      # flips to block once the egress allowlist has real announce traffic.
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-bot

      # index-write Environment's own token, not an elevated GITHUB_TOKEN
      # (ADR-4 BD-6): GitHub does not trigger new workflow runs — including
      # validate.yml's `pull_request` — from events created by the default
      # GITHUB_TOKEN. The secret itself stays named INDEX_WRITE_TOKEN (the
      # `index-write` Environment's credential), but is exposed to the
      # process as $GITHUB_TOKEN — matching adapters/github_api.py's
      # wiring (`cli/_wiring.py`'s `_github_api()`) and the same
      # secret-name-vs-env-var-name split reconcile.yml already uses.
      #
      # Exit-code contract (ADR-4 BD-2): 0 = no-op or applied (indexbot
      # itself writes result=/pr_number= to $GITHUB_OUTPUT); 1 = validation
      # failure (should already be caught by job 1, but never trust that
      # alone); 65 = anomaly, never auto-healed; 75 = transient, backoff
      # exhausted. `continue-on-error` plus explicit exit-code capture lets
      # the anomaly/transient steps below run before the job is failed.
      - name: Run indexbot announce
        id: announce
        continue-on-error: true
        working-directory: bot
        env:
          GITHUB_TOKEN: ${{ secrets.INDEX_WRITE_TOKEN }}
        run: |
          set +e
          uv run indexbot announce
          code=$?
          set -eu
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Anomaly — open or update tracking issue
        if: steps.announce.outputs.exit_code == '65'
        env:
          GH_TOKEN: ${{ secrets.INDEX_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          title="indexbot anomaly: $PACKAGE_ID"
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open \
            --search "in:title \"$title\"" --json number --jq '.[0].number // empty')
          run_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          body="indexbot announce detected a registry-content integrity anomaly for \`$PACKAGE_ID\` (exit 65 — a previously observed pinned tag's content digest changed). This is never auto-healed; a human must investigate before any further writes for this package. Run: $run_url"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "$body"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "$title" --body "$body"
          fi

      - name: Transient failure — retry hint
        if: steps.announce.outputs.exit_code == '75'
        run: |
          echo "::error title=indexbot announce: transient failure::Backoff exhausted for $PACKAGE_ID (exit 75, GHCR weather). Nightly reconcile self-heals; re-dispatch announce manually to retry sooner."

      - name: Fail job on non-zero exit
        if: steps.announce.outputs.exit_code != '0'
        env:
          EXIT_CODE: ${{ steps.announce.outputs.exit_code }}
        run: exit "$EXIT_CODE"
