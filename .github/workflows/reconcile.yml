name: reconcile

# Nightly verify-only sweep (ADR-6 adr_fork_pr_announce.md FP-3, superseding
# ADR-4 BD-1/BD-2's regenerate-and-write reconcile). `indexbot reconcile`
# never writes to `p/` any more — no regenerate, no diff, no commit, no PR —
# it only re-derives every committed root's claimed tags/desc blobs from
# registry truth and, on an anomaly, files or updates the tracking issue
# itself via `GitHubPort.create_or_update_issue` (CONTRACTS.md §12). This
# workflow therefore needs no `index-write` Environment and no write-scoped
# secret at all: the plain default `GITHUB_TOKEN` (`issues: write`) is
# everything the CLI's own issue-filing needs. Single privileged job — still
# gets harden-runner (audit mode, BD-6) and a `concurrency` group that never
# cancels a run mid-sweep.
#
# Exit-code contract (ADR-4 BD-2, reused verbatim):
#   exit 0  -> OK. Nothing further to do.
#   exit 65 -> ANOMALY. Never auto-healed (G-13/FP-3). `indexbot reconcile`
#              itself already filed/updated the tracking issue before
#              exiting — this workflow only annotates a `::warning::`
#              pointing at it and stays GREEN. The filed issue is the human
#              signal (FP-3); failing the nightly build on top of it would
#              just be alarm fatigue for a already-actioned condition.
#   exit 75 -> TRANSIENT. Backoff exhausted (G-10). Fail the job; the nightly
#              cron itself is the retry.
#   anything else -> treated as a hard failure, never silently passed.
on:
  schedule:
    - cron: "17 3 * * *" # nightly, 03:17 UTC (off-peak, avoids the top-of-hour queue)
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: reconcile
  cancel-in-progress: false

jobs:
  reconcile:
    name: reconcile
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout only — verify-only reconcile never writes to p/
      issues: write # indexbot reconcile itself opens/updates the anomaly-tracking issue (exit 65) via GitHubPort
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-bot

      - name: Run indexbot reconcile
        id: reconcile
        working-directory: bot
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if uv run indexbot reconcile 2>&1 | tee reconcile.log; then
            ec=0
          else
            ec=$?
          fi
          echo "exit_code=$ec" >>"$GITHUB_OUTPUT"

      - name: Fail on transient backoff exhaustion
        if: steps.reconcile.outputs.exit_code == '75'
        run: |
          set -euo pipefail
          echo "::error::indexbot reconcile hit a transient failure (backoff exhausted, exit 75) — nightly cron is the retry." >&2
          exit 1

      - name: Anomaly detected — CLI already filed the issue, stay green
        if: steps.reconcile.outputs.exit_code == '65'
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Static, non-interpolated search query for indexbot reconcile's
          # own fixed issue title (CONTRACTS.md §12) — a deep link, not an
          # extra API call, so this step needs no additional token scope.
          issues_url="$GITHUB_SERVER_URL/$REPO/issues?q=is%3Aissue+is%3Aopen+in%3Atitle+%22indexbot+reconcile%3A+anomalies+detected%22"
          echo "::warning title=indexbot reconcile: anomaly detected::indexbot reconcile detected an integrity anomaly and already filed/updated the tracking issue itself (never auto-healed, ADR-6 FP-3) - see $issues_url. This stays green on purpose: the filed issue is the human signal, a red nightly build on top of it is just alarm fatigue."

      - name: Fail on unrecognized exit code
        if: |
          steps.reconcile.outputs.exit_code != '0' &&
          steps.reconcile.outputs.exit_code != '65' &&
          steps.reconcile.outputs.exit_code != '75'
        env:
          EXIT_CODE: ${{ steps.reconcile.outputs.exit_code }}
        run: |
          set -euo pipefail
          echo "::error::indexbot reconcile exited with an unrecognized code ($EXIT_CODE) — treating as a hard failure rather than silently passing." >&2
          exit 1
