name: mutmut

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  mutmut:
    name: mutmut
    runs-on: ubuntu-latest
    # ponytail: baseline signal only (ADR-4 BD-3) — surviving mutants are
    # triaged manually, not gated. Promote to blocking if the count stays
    # actionable.
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-bot

      - name: Run mutmut
        working-directory: bot
        continue-on-error: true
        run: uv run mutmut run

      - name: Render mutmut HTML report
        if: always()
        working-directory: bot
        run: uv run mutmut html

      - name: Upload mutmut report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: mutmut-report
          path: bot/html
          if-no-files-found: warn
