name: render-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

# Replaces deploy.yml (Phase 3, WP3-A): renders the wire tree from p/ into
# site/.vitepress/dist instead of deploying the tracked public/ placeholder
# verbatim. The domain/DNS self-activation block below is ported VERBATIM
# from deploy.yml (battle-tested across PRs #2-#5) -- do not redesign it
# here, only the build+deploy source changed.
jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    concurrency: deploy-pages
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-bot
      # no-cache: this job's own steps below publish to Cloudflare Pages
      # (cloudflare/wrangler-action) -- default action caching here would be
      # a cache-poisoning vector into that publish step (zizmor
      # cache-poisoning finding, high). Bun-executable download is cheap;
      # not worth the exposure.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          no-cache: true

      # ADR (adr_catalog_docs_colocation.md) "Build pipeline order" -- fixed,
      # non-reorderable sequence (reshaped by plan_site_redesign WP-bot/
      # WP-ci: dynamic routes replaced the bot-generated wrapper pages this
      # comment used to describe as a first step): `bun run build` (VitePress
      # `emptyOutDir: true` wipes site/.vitepress/dist clean, compiling
      # site/src/[ns]/[pkg].paths.ts's dynamic routes straight from the
      # committed p/*/*.json tree) -> `indexbot render --out` (config.json +
      # /p/** + /c/index.json + /data/catalog/catalog.json, written INTO the
      # same freshly-emptied tree). Swapping the two steps silently deletes
      # the wire JSON on the next deploy -- see taskfile.yml's render:build
      # target, which encodes this order, not this workflow directly.
      - name: task render:build
        run: task render:build
      - name: task schema:validate:rendered
        run: task schema:validate:rendered

      # Idempotent: fails harmlessly if the project already exists.
      - name: Ensure Pages project
        continue-on-error: true
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create ocx-index --production-branch=main

      - name: Deploy rendered tree to Cloudflare Pages
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/.vitepress/dist --project-name=ocx-index --branch=main

      # Canonical index endpoint: index.ocx.sh (ADR Amendment A1 — ocx.sh stays
      # canonical, ocx.rs parked). The ocx.sh zone is NOT on Cloudflare yet, so
      # the canonical attach self-activates: zone looked up by name at runtime,
      # step no-ops until the zone (and token scope for it) exists.
      # index.ocx.rs stays attached as the live bootstrap endpoint until the
      # cutover; detach it at ocx.rs parking time. Check-then-act idempotent.
      - name: Ensure custom domains + DNS records
        env:
          CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_OCXRS: e7e05c1d7edc241e4a7fde08e423483f # ocx.rs zone id (bootstrap)
        run: |
          set -euo pipefail
          domains="https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/pages/projects/ocx-index/domains"
          auth="Authorization: Bearer $CF_TOKEN"
          json="Content-Type: application/json"

          ensure_domain_and_cname() { # $1=fqdn $2=record-name $3=zone-id
            if ! curl -sS -H "$auth" "$domains" | jq -e --arg d "$1" 'any(.result[]?; .name==$d)' >/dev/null; then
              curl -sS -X POST -H "$auth" -H "$json" "$domains" --data "{\"name\":\"$1\"}" | jq -e '.success'
            fi
            recs="https://api.cloudflare.com/client/v4/zones/$3/dns_records"
            if ! curl -sS -H "$auth" "$recs?type=CNAME&name=$1" | jq -e --arg d "$1" 'any(.result[]?; .name==$d)' >/dev/null; then
              curl -sS -X POST -H "$auth" -H "$json" "$recs" \
                --data "{\"type\":\"CNAME\",\"name\":\"$2\",\"content\":\"ocx-index.pages.dev\",\"proxied\":true,\"comment\":\"OCX index endpoint to Pages\"}" \
                | jq -e '.success'
            fi
          }

          # Bootstrap endpoint (live today).
          ensure_domain_and_cname "index.ocx.rs" "index" "$CF_ZONE_OCXRS"

          # Canonical endpoint — self-activates once the ocx.sh zone is on
          # Cloudflare AND the API token can read/edit it.
          zone_ocxsh=$(curl -sS -H "$auth" \
            "https://api.cloudflare.com/client/v4/zones?name=ocx.sh" \
            | jq -r '.result[0].id // empty' || true)
          if [ -n "$zone_ocxsh" ]; then
            ensure_domain_and_cname "index.ocx.sh" "index" "$zone_ocxsh"
          else
            echo "ocx.sh zone not visible to this token yet — skipping canonical domain attach."
          fi

  smoke:
    name: smoke
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      # --allow-empty: pre-seed state (no p/ roots committed yet, Phase 4) —
      # the digest-chain section tolerates a config.json-only deploy; every
      # other check (ETag, cache-rule, catalog, docs) still runs and still
      # contributes to the exit code.
      - name: scripts/smoke-test.sh
        run: scripts/smoke-test.sh https://index.ocx.sh --allow-empty
