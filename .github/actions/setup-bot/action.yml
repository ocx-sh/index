name: setup-bot
description: >-
  Install the pinned uv + Task toolchain shared by every indexbot CI job
  (schema-validate, bot-lint, bot-test, bot-audit, workflows-lint, mutmut).

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      with:
        version: "0.11.15"

    - name: Install Task
      uses: arduino/setup-task@c0bc642852239c2689f73f4ea6459c29405f3c52  # v3.0.0
      with:
        version: "3.x"
        repo-token: ${{ github.token }}
